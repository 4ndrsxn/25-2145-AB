<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Elegance Jewelers | Black Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;   /* deep black background */
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #f0f0f0;
            line-height: 1.5;
        }

        /* ========== GLOBAL STYLES ========== */
        a {
            text-decoration: none;
            color: #f0f0f0;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #c7a84b;   /* elegant gold accent */
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 2rem;
        }

        /* ========== NAVIGATION (BLACK & GOLD) ========== */
        nav {
            background: #0a0a0a;
            border-bottom: 1px solid #2a2a2a;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .logo {
            font-size: 1.8rem;
            letter-spacing: 3px;
            font-weight: 300;
            color: #c7a84b;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
            list-style: none;
            font-size: 1rem;
            font-weight: 500;
        }

        .nav-links a {
            color: #e0e0e0;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #c7a84b;
            border-bottom-color: #c7a84b;
        }

        /* ========== HERO SECTION (HOME) ========== */
        .hero {
            text-align: center;
            padding: 5rem 2rem 6rem;
            background: radial-gradient(circle at 30% 10%, #1a1308, #000000);
            border-bottom: 1px solid #2c2c2c;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #c7a84b;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 1.2rem auto;
            color: #ccc;
        }

        .btn-gold {
            display: inline-block;
            background: #c7a84b;
            color: #000;
            padding: 12px 32px;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 40px;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-gold:hover {
            background: #e0b85c;
            transform: scale(1.02);
            color: #000;
        }

        /* ========== SECTION TITLES ========== */
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 300;
            margin: 2.5rem 0 2rem;
            letter-spacing: 2px;
            color: #c7a84b;
            border-bottom: 1px solid #2c2c2c;
            display: inline-block;
            width: auto;
            padding-bottom: 0.5rem;
        }

        .title-wrapper {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* ========== PRODUCT GRID (JEWELRY IMAGES) ========== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .card {
            background: #111111;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s;
            border: 1px solid #2a2a2a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.8);
            border-color: #c7a84b40;
        }

        .card-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #1e1e1e;
            display: block;
        }

        .card-info {
            padding: 1.2rem;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 500;
            color: #f5e7c8;
        }

        .card-price {
            color: #c7a84b;
            margin: 0.5rem 0;
            font-weight: bold;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #aaa;
        }

        /* ========== SERVICES PAGE STYLES ========== */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .service-card {
            background: #0c0c0c;
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #2a2a2a;
            transition: 0.2s;
        }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .service-card h3 {
            color: #c7a84b;
            margin-bottom: 1rem;
        }

        /* ========== ACCESSORIES PAGE SPECIFIC ========== */
        .accessory-badge {
            background: #1f1a0e;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #c7a84b;
            margin-bottom: 0.6rem;
        }

        /* ========== FOOTER ========== */
        footer {
            background: #050505;
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #222;
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #777;
        }

        /* responsive */
        @media (max-width: 750px) {
            nav {
                flex-direction: column;
                gap: 1rem;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- ==================== NAVIGATION ==================== -->
<nav>
    <div class="logo">⚜️ ELEGANCE</div>
    <ul class="nav-links">
        <li><a href="#" data-page="home" class="nav-link active">HOME</a></li>
        <li><a href="#" data-page="accessories" class="nav-link">ACCESSORIES</a></li>
        <li><a href="#" data-page="services" class="nav-link">SERVICES</a></li>
    </ul>
</nav>

<!-- ==================== DYNAMIC CONTENT AREA ==================== -->
<main id="app-root">
    <!-- home page will be injected by JS, but we preload structure -->
</main>

<footer>
    <p>✨ ELEGANCE JEWELERS — Timeless Craftsmanship on a Black Canvas ✨</p>
    <p style="margin-top: 0.5rem;">© 2026 | Bespoke jewelry & heirloom quality | All rights reserved</p>
</footer>

<script>
    // ---------- JEWELRY IMAGES (curated luxury stock + unsplash-like placeholders but elegant)
    // Using high-quality placeholder images that represent real jewelry visuals.
    // For production, replace with actual image URLs. These are realistic jewelry placeholders from reliable image CDN.
    
    // HOME page jewelry images (rings, necklaces, bracelets)
    const homeProducts = [
        { title: "Eternal Solitaire Ring", price: "$2,299", desc: "Platinum & 1.5ct diamond", img: "https://images.pexels.com/photos/1184120/pexels-photo-1184120.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop" },
        { title: "Golden Grace Pendant", price: "$2,850", desc: "18k yellow gold, delicate chain", img: "https://images.pexels.com/photos/1452972/pexels-photo-1452972.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop" },
        { title: "Baroque Pearl Studs", price: "$2,500", desc: "Freshwater pearls, white gold", img: "https://images.pexels.com/photos/818828/pexels-photo-818828.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop" },
        { title: "Emerald Halo Bracelet", price: "$3,750", desc: "Colombian emeralds & diamonds", img: "https://images.pexels.com/photos/914668/pexels-photo-914668.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop" },
        { title: "Midnight Sapphire Ring", price: "$4,100", desc: "Blue sapphire, rose gold band", img: "https://images.pexels.com/photos/1927259/pexels-photo-1927259.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop" },
        { title: "Infinity Diamond Necklace", price: "$5,200", desc: "Layered brilliance, 2ct tw", img: "https://images.pexels.com/photos/1709003/pexels-photo-1709003.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop" }
    ];

    // ACCESSORIES page: cufflinks, watches, leather goods, jewelry accessories
    const accessoriesProducts = [
        { title: "Classic Gold Cufflinks", price: "$950", desc: "18k gold, engine-turned design", img: "https://images.pexels.com/photos/2870325/pexels-photo-2870325.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop", badge: "Limited" },
        { title: "Luxury Chronograph Watch", price: "$5,600", desc: "Stainless steel & leather strap", img: "https://images.pexels.com/photos/190819/pexels-photo-190819.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop", badge: "New" },
        { title: "Pearl Leather Bracelet", price: "$780", desc: "Black cord with cultured pearl", img: "https://images.pexels.com/photos/2709775/pexels-photo-2709775.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop", badge: "Best Seller" },
        { title: "Sapphire Hair Pin", price: "$420", desc: "White gold, accent sapphires", img: "https://images.pexels.com/photos/711445/pexels-photo-711445.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop", badge: "Exclusive" },
        { title: "Diamond Tennis Bracelet", price: "$3,890", desc: "Round brilliant, 3ct tw", img: "https://images.pexels.com/photos/1191690/pexels-photo-1191690.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop", badge: "Iconic" },
        { title: "Onyx & Gold Ring", price: "$1,450", desc: "Black onyx, yellow gold setting", img: "https://images.pexels.com/photos/935743/pexels-photo-935743.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop", badge: "Statement" }
    ];

    // SERVICES page content + images (showcasing craftsmanship & workshop images)
    const servicesList = [
        { name: "BESPOKE DESIGN", icon: "✍️", description: "Personalized sketches & custom creations from your vision. Work with master jewelers.", img: "https://images.pexels.com/photos/3769981/pexels-photo-3769981.jpeg?auto=compress&cs=tinysrgb&w=400&h=250&fit=crop" },
        { name: "EXPERT REPAIRS", icon: "🔧", description: "Precision restoration, resizing, prong retipping & stone tightening.", img: "https://images.pexels.com/photos/7217982/pexels-photo-7217982.jpeg?auto=compress&cs=tinysrgb&w=400&h=250&fit=crop" },
        { name: "ENGRAVING", icon: "🖋️", description: "Hand-engraved messages, dates or monograms inside rings & lockets.", img: "https://images.pexels.com/photos/6795251/pexels-photo-6795251.jpeg?auto=compress&cs=tinysrgb&w=400&h=250&fit=crop" },
        { name: "CONCIERGE", icon: "🥂", description: "Private appointments, gem sourcing & heirloom transformation.", img: "https://images.pexels.com/photos/3822977/pexels-photo-3822977.jpeg?auto=compress&cs=tinysrgb&w=400&h=250&fit=crop" }
    ];

    // Helper: generate product cards HTML (images + details)
    function renderProductGrid(products, withBadge = false) {
        if (!products.length) return '<p class="error">No items available</p>';
        let html = `<div class="product-grid">`;
        for (let p of products) {
            html += `
                <div class="card">
                    <img class="card-img" src="${p.img}" alt="${p.title}" loading="lazy" onerror="this.src='https://placehold.co/400x300/222222/c7a84b?text=Elegance+Gem'">
                    <div class="card-info">
                        ${withBadge && p.badge ? `<span class="accessory-badge">${p.badge}</span>` : ''}
                        <div class="card-title">${p.title}</div>
                        <div class="card-price">${p.price}</div>
                        <div class="card-desc">${p.desc}</div>
                    </div>
                </div>
            `;
        }
        html += `</div>`;
        return html;
    }

    function renderServicesPage() {
        let servicesHtml = `<div class="container">`;
        servicesHtml += `<div class="title-wrapper"><h2 class="section-title">✨ PREMIUM SERVICES ✨</h2></div>`;
        servicesHtml += `<div class="services-grid">`;
        for (let s of servicesList) {
            servicesHtml += `
                <div class="service-card">
                    <div class="service-icon">${s.icon}</div>
                    <h3>${s.name}</h3>
                    <p style="margin-bottom: 1rem; color:#bbb;">${s.description}</p>
                    <img src="${s.img}" alt="${s.name}" style="width:100%; height:170px; object-fit:cover; border-radius:12px; margin-top:0.5rem; border:1px solid #333;" onerror="this.src='https://placehold.co/400x200/1a1a1a/c7a84b?text=Craftsmanship'">
                </div>
            `;
        }
        servicesHtml += `</div>`;
        // add additional text about consultations
        servicesHtml += `<div style="background:#0c0c0c; border-radius:28px; margin-top:3rem; padding:2rem; text-align:center; border:1px solid #2a2a2a;">
            <h3 style="color:#c7a84b;">📅 Book a private consultation</h3>
            <p style="max-width:600px; margin:1rem auto;">Our experts guide you through gem selection, design sketches, and final polish. Complimentary first appointment.</p>
            <a href="#" class="btn-gold" style="background:#c7a84b; color:#000;">REQUEST APPOINTMENT</a>
        </div>`;
        servicesHtml += `</div>`;
        return servicesHtml;
    }

    function renderHomePage() {
        return `
            <section class="hero">
                <h1>ELEGANCE JEWELERS</h1>
                <p>Timeless craftsmanship meets modern sophistication — each piece tells a story of passion and brilliance on a black canvas.</p>
                <a href="#" class="btn-gold" data-nav="accessories">DISCOVER COLLECTION</a>
            </section>
            <div class="container">
                <div class="title-wrapper"><h2 class="section-title">🌟 ICONIC JEWELRY</h2></div>
                ${renderProductGrid(homeProducts, false)}
                <div style="text-align: center; margin: 2rem 0 1rem;">
                    <p style="color:#c7a84b;">“Elegance is not just what you wear, it is who you are.”</p>
                </div>
                <!-- Extra gallery hint: timeless -->
                <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:2rem;">
                    <img src="https://images.pexels.com/photos/2102667/pexels-photo-2102667.jpeg?auto=compress&cs=tinysrgb&w=300&h=200&fit=crop" style="border-radius:20px; width:200px; height:140px; object-fit:cover; border:1px solid #c7a84b40;" alt="craft">
                    <img src="https://images.pexels.com/photos/3580850/pexels-photo-3580850.jpeg?auto=compress&cs=tinysrgb&w=300&h=200&fit=crop" style="border-radius:20px; width:200px; height:140px; object-fit:cover;" alt="gold">
                </div>
            </div>
        `;
    }

    function renderAccessoriesPage() {
        return `
            <div class="container">
                <div class="title-wrapper"><h2 class="section-title">🕰️ LUXURY ACCESSORIES</h2></div>
                <p style="text-align:center; margin-bottom:1rem; color:#bcbcbc;">Refined details for the modern collector — from cufflinks to exclusive timepieces.</p>
                ${renderProductGrid(accessoriesProducts, true)}
                <div style="margin: 2rem 0; background:#0b0b0b; border-radius: 24px; padding: 1.5rem; text-align:center;">
                    <span style="font-size:2rem;">✨</span>
                    <p>Complimentary gift wrapping & lifetime cleaning on all accessories.</p>
                </div>
            </div>
        `;
    }

    // ----- NAVIGATION LOGIC (single page app style)-----
    let currentPage = "home";

    function updateActiveNav(pageId) {
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            const pageAttr = link.getAttribute('data-page');
            if (pageAttr === pageId) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }

    function renderPage(page) {
        const appRoot = document.getElementById('app-root');
        if (!appRoot) return;
        let content = "";
        if (page === "home") {
            content = renderHomePage();
        } else if (page === "accessories") {
            content = renderAccessoriesPage();
        } else if (page === "services") {
            content = renderServicesPage();
        } else {
            content = renderHomePage();
        }
        appRoot.innerHTML = content;
        currentPage = page;
        updateActiveNav(page);

        // attach event listeners for any internal buttons that need routing (like "DISCOVER COLLECTION")
        const discoverBtn = document.querySelector('[data-nav="accessories"]');
        if (discoverBtn) {
            discoverBtn.addEventListener('click', (e) => {
                e.preventDefault();
                renderPage("accessories");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
        // also attach service appointment button dummy (just scroll)
        const appointBtn = document.querySelector('.service-card + .btn-gold, .btn-gold');
        if (appointBtn && page === "services") {
            // we don't want to conflict with the existing one, but optional smooth alert
            const btns = document.querySelectorAll('.btn-gold');
            btns.forEach(btn => {
                if (btn.innerText.includes('REQUEST') || btn.innerText.includes('APPOINTMENT')) {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert("✨ Private consultation booking — our concierge will reach out within 24h. ✨");
                    });
                }
            });
        }
    }

    // initialize navigation clicks
    function bindNavEvents() {
        const navItems = document.querySelectorAll('.nav-link');
        navItems.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageId = link.getAttribute('data-page');
                if (pageId === "home") renderPage("home");
                else if (pageId === "accessories") renderPage("accessories");
                else if (pageId === "services") renderPage("services");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    }

    // initial render home
    renderPage("home");
    bindNavEvents();

    // handle any hash navigation or future dynamic
    window.addEventListener('popstate', () => {
        const hashPage = window.location.hash.replace('#', '');
        if (hashPage === 'accessories') renderPage('accessories');
        else if (hashPage === 'services') renderPage('services');
        else renderPage('home');
    });
</script>
</body>
</html>
